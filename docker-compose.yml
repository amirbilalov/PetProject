services:
  postgres:
    image: postgres:15-alpine
    container_name: booking1-postgres
    restart: always
    environment:
      POSTGRES_DB: BookingDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: